services:
  - type: web
    name: buildsync-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: USE_SQLITE_ONLY
        value: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
